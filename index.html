<!DOCTYPE html>
<html lang="fr">
<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>TabibDZ – Annuaire Médical</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --blue: #1D4ED8; --blue-dk: #1E3A5F; --blue-lt: #EFF6FF; --teal: #0891B2; --green: #16A34A; --green-lt: #DCFCE7; --red: #DC2626; --red-lt: #FEE2E2; --amber: #D97706; --amber-lt: #FEF3C7; --page-bg: #F1F5F9; }
    body{background:var(--page-bg);font-family:system-ui,sans-serif;min-height:100dvh;}
    .hdr{background:linear-gradient(140deg,#1E3A5F 0%,#1D4ED8 100%);}
    .sz{position:sticky;top:0;z-index:40;background:#1E3A5F;padding:10px 14px 14px;box-shadow:0 4px 16px rgba(30,58,95,.30);}
    .si{width:100%;padding:13px 46px;border-radius:13px;border:2px solid transparent;font-size:16px;background:#fff;color:#1F2937;outline:none;}
    .sic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#9CA3AF;pointer-events:none;}
    .sclr{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:#E5E7EB;border-radius:50%;width:24px;height:24px;cursor:pointer;display:none;align-items:center;justify-content:center;}
    .row{display:flex;gap:8px;overflow-x:auto;padding:10px 14px;scrollbar-width:none;}
    .chip{flex-shrink:0;padding:7px 15px;border-radius:999px;font-size:13px;font-weight:600;background:#fff;border:2px solid #CBD5E1;cursor:pointer;}
    .chip.on{background:var(--blue);border-color:var(--blue);color:#fff;}
    .schip{flex-shrink:0;padding:5px 13px;border-radius:999px;font-size:12px;font-weight:600;background:#fff;border:1.5px solid #E2E8F0;cursor:pointer;}
    .schip.on{background:var(--teal);border-color:var(--teal);color:#fff;}
    .card{background:#fff;border-radius:18px;border:1px solid #E2E8F0;margin:0 14px 16px;overflow:hidden;}
    .skel{background:linear-gradient(90deg,#E2E8F0 25%,#F8FAFC 50%,#E2E8F0 75%);background-size:200% 100%;animation:sh 1.3s infinite;border-radius:8px;}
    @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  </style>
</head>
<body>

<header class="hdr text-white px-4 pt-10 pb-5">
  <h1 class="text-2xl font-black">TabibDZ</h1>
  <p class="text-blue-100/75 text-sm">Annuaire médical et avis.</p>
</header>

<div class="sz">
  <div class="relative">
    <span class="sic">🔍</span>
    <input id="q" class="si" type="search" placeholder="Nom, spécialité ou ville…"/>
    <button id="clr" class="sclr">✕</button>
  </div>
</div>

<div class="row" id="wbar"></div>
<div class="row" id="sbar" style="padding-top:0"></div>
<div class="stats p-4 text-sm text-gray-500" id="statsTxt">Chargement…</div>

<main id="list"></main>

<script>
let ALL=[], activeW='Toutes', activeS='Toutes';
const FB=[
  {id:1,nom:"Dr. Benali Ahmed",specialite:"Ophtalmologue",ville:"Ain Touta",wilaya:"Batna",adresse:"Rue principale",telephone:"0550123456",horaires:"08:00 - 16:00",disponible:true,lat:35.4167,lng:5.8833},
  {id:2,nom:"Dr. Mansouri Djamila",specialite:"Pédiatre",ville:"Batna",wilaya:"Batna",adresse:"Cité 1200",telephone:"0661987654",horaires:"09:00 - 17:00",disponible:true,lat:35.5555,lng:6.1667}
];

let supabase = null;
try {
  supabase = window.supabase.createClient(
    'https://viabbtrtusufxbuhxypb.supabase.co',
    'sb_publishable_i2E9hvP2PfkSsrYauszvCw_GO7BhNeP'
  );
} catch(e) { console.error("Erreur init", e); }

async function load() {
  if (supabase) {
    const { data, error } = await supabase.from('medecins').select('*');
    ALL = error ? FB : data;
  } else {
    ALL = FB;
  }
  render(ALL);
}

function render(docs) {
  const list = document.getElementById('list');
  list.innerHTML = docs.map(d => `
    <div class="card p-4">
      <h2 class="font-bold text-lg">${d.nom}</h2>
      <p class="text-sm text-gray-600">${d.specialite} - ${d.ville}</p>
      <a href="tel:${d.telephone}" class="block mt-3 bg-green-600 text-white text-center py-2 rounded-lg font-bold">Appeler</a>
    </div>
  `).join('');
  document.getElementById('statsTxt').textContent = `${docs.length} médecin(s) trouvé(s)`;
}

document.getElementById('q').addEventListener('input', (e) => {
  const val = e.target.value.toLowerCase();
  render(ALL.filter(d => d.nom.toLowerCase().includes(val) || d.specialite.toLowerCase().includes(val)));
});

load();
</script>
</body>
</html>
